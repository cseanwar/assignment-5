<body>
    <nav>
        <div class="navbar flex justify-between px-[80px] bg-white shadow-sm">
            <div class="flex gap-1 justify-center items-center">
                <img class="w-[36px]" src="./assets/github-logo.png" alt="">
                <h3 class="font-semibold text-2xl">GitHub Issues Tracker</h3>
            </div>
            <div class="flex gap-2">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g
                            stroke-linejoin="round"
                            stroke-linecap="round"
                            stroke-width="2.5"
                            fill="none"
                            stroke="currentColor"
                        >
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input type="search" required placeholder="Search Issues..." />
                </label>
                <button class="btn btn-active btn-primary"><i class="fa-solid fa-plus"></i>New Issue</button>
            </div>
        </div>
    </nav>

    <main class="bg-[#f8fafcFF]">
        <section  class="w-9/12 mx-auto pt-[60px] mb-[16px]">
            <div class="bg-[#FFFFFF] w-full p-[24px] border border-gray-100 rounded-md shadow-sm">
                <button class="btn btn-primary w-25 h-8">All</button>
                <button class="btn btn-outline w-25 h-8 text-[#64748B] border-[#E4E4E7]">Open</button>
                <button class="btn btn-outline w-25 h-8 text-[#64748B] border-[#E4E4E7]">Closed</button>
            </div>
        </section>

        <section class="w-9/12 mx-auto">
            <div class="flex items-center justify-between bg-[#FFFFFF] border border-gray-100 rounded-md rounded-b-none p-4 shadow-sm">
                <div class="flex items-center space-x-2">
                    <div class="flex items-center justify-center w-13 h-13 bg-[#ece4ffFF] rounded-full">
                        <img src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="text-xl font-bold">50 Issues</h2>
                        <p class="text-[#64748bFF] text-base">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <div class="flex items-center space-x-2">
                        <span class="w-3 h-3 bg-[#00a96eFF] rounded-full"></span>
                        <span class="text-base">Open</span>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="w-3 h-3 bg-[#A855F7] rounded-full"></span>
                        <span class="text-base">Closed</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Issues card -->
        <section class="w-9/12 mx-auto card card-body bg-[#FBFBFB] border-t border-gray-200 rounded-t-none">
